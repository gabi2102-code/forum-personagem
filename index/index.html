<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/style.css">
    <title>Dora aventureira</title>
</head>

<body id="pagina_login">

    <div id="container" class="container text-dark-emphasis border rounded-3 shadow-lg p-3 mb-5 bg-body-tertiary"
        style="margin-top:50px; max-width: 600px;">

        <h3 id="titulo" class="text-center" style="margin-top:30px">
            <strong> Login da Dora Aventureira </strong>
        </h3>

        <p id="subtitulo" class="text-center" style="margin-bottom:50px">
            Preencha os dados abaixo para começar sua aventura com a Dora.
        </p>

        <form id="formulario" class="row g-3 needs-validation" novalidate>

            <div class="row">
                <label for="nome" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="nome">
                <div class="valid-feedback"></div>

                <label for="senha" class="form-label">Senha </label>
                <input type="password" class="form-control" id="senha">
                <div class="valid-feedback"></div>
            </div>

            <div class="row mt-3">
                <button id="button" type="submit">Explorar</button>
            </div>

        </form>

    </div>

    <div id="mensagem"></div>

    <footer>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="../script.js"></script>

</body>

</html>
