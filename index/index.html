<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Dora</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body id="login">

<div class="login-box">
    <h2 class="text-center text-success">Login - Dora</h2>

    <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuário">
    <input type="password" id="senha" class="form-control mb-2" placeholder="Senha">

    <button class="btn btn-success w-100" onclick="login()">Entrar</button>

    <p id="erro" class="text-danger mt-2"></p>
</div>

<script src="script.js"></script>
</body>
</html>
